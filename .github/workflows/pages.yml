name: Deploy MMBasic Web to GitHub Pages

on:
  push:
    branches: [main]
    tags: ['*']
    paths:
      - 'VERSION'
      - 'ports/host_wasm/**'
      - 'ports/host_native/**'
      - 'core/**'
      - 'drivers/**'
      - 'hal/**'
      - 'tools/**'
      - '.github/workflows/pages.yml'
      # Shared source in the repo root feeds the wasm build too.
      - '*.c'
      - '*.h'
      - '*.bas'
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          # 5.0.2 matches the version this repo's wasm build is tested
          # against locally; 3.1.64's wasm-ld doesn't recognise
          # --allow-multiple-definition (needed for MMBasic's tentative-
          # def merge idiom under clang).
          version: 5.0.2
          actions-cache-folder: emsdk-cache

      - name: Build wasm
        working-directory: ports/host_wasm
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            tag_version="${GITHUB_REF_NAME}"
            case "$tag_version" in
              v*)
                echo "Release tags must not start with v; use 1.0.1, not v1.0.1" >&2
                exit 1
                ;;
            esac
            file_version="$(cat ../../VERSION)"
            if [ "$tag_version" != "$file_version" ]; then
              echo "Tag version $tag_version does not match VERSION $file_version" >&2
              exit 1
            fi
            export MMBA_RELEASE_VERSION="$tag_version"
          fi
          ./build.sh

      - name: Assemble site
        run: |
          mkdir -p _site
          # Only the browser-side artefacts. node_modules, smoke tests,
          # and serve.py stay out of the Pages build.
          cp ports/host_wasm/web/index.html             _site/
          cp ports/host_wasm/web/manifest.webmanifest   _site/
          cp ports/host_wasm/web/icon.svg               _site/
          cp ports/host_wasm/web/apple-touch-icon.png   _site/
          cp ports/host_wasm/web/safari-pinned-tab.svg  _site/
          cp ports/host_wasm/web/picomite.css           _site/
          cp ports/host_wasm/web/app.mjs                _site/
          cp ports/host_wasm/web/app_version.mjs        _site/
          cp ports/host_wasm/web/proxy_client.mjs       _site/
          cp ports/host_wasm/web/worker.mjs             _site/
          cp ports/host_wasm/web/coi-serviceworker.js   _site/
          cp ports/host_wasm/web/picomite.mjs           _site/
          cp ports/host_wasm/web/picomite.js            _site/ 2>/dev/null || true
          cp ports/host_wasm/web/picomite.wasm          _site/
          cp ports/host_wasm/web/picomite.data          _site/
          mkdir -p _site/ui _site/vendor
          cp ports/host_wasm/web/ui/audio.js            _site/ui/
          cp ports/host_wasm/web/vendor/codemirror.js   _site/vendor/
          ls -la _site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
