name: Build PicoMite firmware (.uf2)

on:
  push:
    branches: [main]
    paths:
      - '*.c'
      - '*.h'
      - 'CMakeLists.txt'
      - 'buildall.sh'
      - 'build_picocalc_firmware.sh'
      - 'cmake/**'
      - 'core/**'
      - 'drivers/**'
      - 'hal/**'
      - 'ports/**'
      - 'runtime/**'
      - 'shared/**'
      - 'third_party/**'
      - 'tools/check_hal_purity.sh'
      - 'tools/check_flash_layout.sh'
      - 'tools/check_ram_baseline.sh'
      - 'tools/patch_pico_sdk_gcc15.sh'
      - 'tools/ram_baseline_*.txt'
      - '.github/workflows/firmware.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Full compile gate AND artifact source. Mirrors the local buildall.sh;
  # every supported port must build clean, then every target's .uf2 is
  # harvested from build_all/ and uploaded for the release job. One Pico
  # SDK checkout covers all variants — no per-target matrix fan-out.
  buildall:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install arm-none-eabi toolchain
        # Pinned to 14.2.Rel1 to match the local toolchain; Ubuntu's
        # gcc-arm-none-eabi 13.2.1 produces ~4 KB larger binaries that
        # push RP2040 VGA over the RAM limit.
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '14.2.Rel1'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              cmake ninja-build python3 build-essential
      - name: Check out Pico SDK
        uses: actions/checkout@v4
        with:
          repository: raspberrypi/pico-sdk
          ref: 2.1.1
          path: pico-sdk
          submodules: recursive
      - name: Patch Pico SDK for newer host GCC
        run: bash tools/patch_pico_sdk_gcc15.sh "${{ github.workspace }}/pico-sdk"
      - name: Run buildall.sh
        env:
          PICO_SDK_PATH: ${{ github.workspace }}/pico-sdk
          SKIP_HAL_PURITY: '1'
        run: ./buildall.sh

      - name: Stage firmware artifacts
        # Every target's executable is named PicoMite, so build_all/<target>/
        # PicoMite.uf2 would collide when flattened. Rename each by its
        # build_all/ directory name (the canonical buildall TARGET).
        run: |
          mkdir -p artifacts
          for d in build_all/*/; do
            t=$(basename "$d")
            uf2=$(find "$d" -maxdepth 2 -name '*.uf2' | head -1)
            if [ -n "$uf2" ]; then
              cp -v "$uf2" "artifacts/PicoMite-${t}.uf2"
            else
              echo "no .uf2 for target $t" >&2
            fi
          done
          ls -la artifacts
          expected=$(find build_all -maxdepth 1 -mindepth 1 -type d | wc -l)
          count=$(find artifacts -name '*.uf2' | wc -l)
          echo "Staged $count of $expected firmware images"
          if [ "$count" -ne "$expected" ]; then
            echo "Expected $expected .uf2 images, got $count" >&2
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: firmware-uf2
          path: artifacts/*.uf2
          if-no-files-found: error

  release:
    # Publish every device .uf2 as raw downloads on a rolling 'latest'
    # release after the build gate succeeds. No zip wrapper, direct links.
    needs: buildall
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create/update releases + tags
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: firmware-uf2
          path: release

      - name: Upsert 'latest' release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha=$(git rev-parse --short HEAD)
          date=$(git log -1 --format=%cI)
          summary=$(git log -1 --format='%s')

          # Generate the download table from whatever was actually staged,
          # so it never drifts from buildall.sh's TARGETS list.
          {
            echo "Rolling build from \`main\`."
            echo ""
            echo "**Commit:** [\`$sha\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) — $summary"
            echo "**Built:** $date"
            echo ""
            echo "### Downloads"
            echo ""
            echo "| File |"
            echo "|---|"
            for f in $(ls release/*.uf2 | sort); do
              echo "| \`$(basename "$f")\` |"
            done
            echo ""
            echo "Web build: <https://jvanderberg.github.io/PicoMiteAllVersions/>"
          } > notes.md

          # 'gh release edit' doesn't replace assets cleanly; simplest
          # is delete-then-recreate so stale uf2s from previous commits
          # can't linger.
          gh release delete latest --cleanup-tag --yes 2>/dev/null || true
          gh release create latest \
              --title "Latest build" \
              --notes-file notes.md \
              --target "${{ github.sha }}" \
              release/*.uf2
