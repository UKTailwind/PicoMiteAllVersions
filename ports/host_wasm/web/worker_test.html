<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>PicoMite Worker Test</title>
<style>
  :root { color-scheme: dark; }
  html, body {
    margin: 0;
    padding: 0;
    background: #0a0b0d;
    color: #e6e6e6;
    font-family: ui-monospace, Menlo, Consolas, monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  #screen {
    image-rendering: pixelated;
    outline: none;
    background: #000;
  }
  #status {
    font-size: 0.8rem;
    color: #6a6a6a;
    padding: 0.5rem;
    letter-spacing: 0.02em;
  }
  #status.error { color: #ff6464; }
</style>
</head>
<body>
<canvas id="screen" width="320" height="320" tabindex="0"></canvas>
<div id="status">Booting worker…</div>
<!-- audio.js installs window.picomiteAudio; worker_test.mjs forwards
     PLAY events from the worker to it. -->
<script src="./ui/audio.js"></script>
<script type="module" src="./worker_test.mjs"></script>
</body>
</html>
