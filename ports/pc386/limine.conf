# ports/pc386/limine.conf — Limine bootloader configuration for A:.
#
# Lives on the boot floppy at /boot/limine.conf. Limine's stage 2
# (limine-bios.sys, also at /boot/) reads this file after the MBR/VBR
# hands off, then loads the kernel via the multiboot1 protocol.
#
# Stage 0/1/2 of the pc386 port set the multiboot1 magic in
# ports/pc386/boot.S, so this is the same kernel binary the QEMU
# -kernel dev path boots — no rebuild needed when switching paths.

# Boot the only entry instantly. No menu, no delay.
timeout: 0

# Mirror the bootloader's own output to COM1 too, so headless test
# runs see "Booting PicoMite PC386" alongside the kernel banner.
serial: yes
quiet: no

/PicoMite PC386
    protocol: multiboot1
    kernel_path: boot():/boot/mmbasic.elf
